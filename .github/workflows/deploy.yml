script: |
  if [ ! -d "movie_recommender_deployed_aws" ]; then
    git clone https://github.com/119-sam/movie_recommender_deployed_aws.git
  fi
  cd movie_recommender_deployed_aws
  git pull

  docker stop movie-recommender || true
  docker rm movie-recommender || true

  docker build -t movie-recommender .
  docker run -d -p 8501:8501 movie-recommender